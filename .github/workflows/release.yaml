name: Release
on:
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install Dependencies
        run: npm ci
      - name: Run linters
        run: npm run lint
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ['lts/hydrogen', 'lts/iron', 'lts/*']
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test
        env:
          CI: true
          parallel: true
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm test
        env:
          CI: true
      - name: Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test, coverage]
    environment: semantic-release
    env:
      GIT_AUTHOR_NAME: ${{ secrets.GIT_USER_NAME }}
      GIT_AUTHOR_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
      GIT_COMMITTER_NAME: ${{ secrets.GIT_USER_NAME }}
      GIT_COMMITTER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          persist-credentials: true
      - name: Configure git author and SSH commit signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          KEY="${RUNNER_TEMP}/signing-key"
          printf '%s\n' "$SIGNING_KEY" > "$KEY"
          chmod 600 "$KEY"
          ssh-keygen -y -f "$KEY" > "${KEY}.pub"
          eval "$(ssh-agent -s)"
          ssh-add "$KEY"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
          git config --local gpg.format ssh
          git config --local user.signingkey "${KEY}.pub"
          git config --local commit.gpgsign true
          git config --local tag.gpgsign true
          git config --local user.name "$GIT_AUTHOR_NAME"
          git config --local user.email "$GIT_AUTHOR_EMAIL"
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Semantic Release
        run: >-
          npx -p semantic-release -p @semantic-release/changelog -p @semantic-release/exec
          -p @semantic-release/git semantic-release --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
